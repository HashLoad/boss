version: "2"

run:
  timeout: 3m
  relative-path-mode: gomod

linters:
  default: none
  enable:
    ## enabled by default
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    ## disabled by default
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - cyclop
    - depguard
    - dupl
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - iface
    - intrange
    - lll
    - loggercheck
    - makezero
    - mirror
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    #- perfsprint
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    #- revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - testableexamples
    - testifylint
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    depguard:
      rules:
        "deprecated":
          files:
            - "$all"
          deny:
            - pkg: "github.com/golang/protobuf"
              desc: "Use google.golang.org/protobuf instead, see https://developers.google.com/protocol-buffers/docs/reference/go/faq#modules"
            - pkg: "github.com/satori/go.uuid"
              desc: "Use github.com/google/uuid instead, satori's package is not maintained"
            - pkg: "github.com/gofrs/uuid$"
              desc: "Use github.com/gofrs/uuid/v5 or later, it was not a go module before v5"
        "non-test files":
          files:
            - "!$test"
          deny:
            - pkg: "math/rand$"
              desc: "Use math/rand/v2 instead, see https://go.dev/blog/randv2"
        "non-main files":
          files:
            - "!**/main.go"
          deny:
            - pkg: "log$"
              desc: "Use log/slog instead, see https://go.dev/blog/slog"

    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map

    exhaustruct:
      exclude:
        - "^net/http.Client$"
        - "^net/http.Cookie$"
        - "^net/http.Request$"
        - "^net/http.Response$"
        - "^net/http.Server$"
        - "^net/http.Transport$"
        - "^net/url.URL$"
        - "^os/exec.Cmd$"
        - "^reflect.StructField$"
        - "^github.com/Shopify/sarama.Config$"
        - "^github.com/Shopify/sarama.ProducerMessage$"
        - "^github.com/mitchellh/mapstructure.DecoderConfig$"
        - "^github.com/prometheus/client_golang/.+Opts$"
        - "^github.com/spf13/cobra.Command$"
        - "^github.com/spf13/cobra.CompletionOptions$"
        - "^github.com/stretchr/testify/mock.Mock$"
        - "^github.com/testcontainers/testcontainers-go.+Request$"
        - "^github.com/testcontainers/testcontainers-go.FromDockerfile$"
        - "^golang.org/x/tools/go/analysis.Analyzer$"
        - "^google.golang.org/protobuf/.+Options$"
        - "^gopkg.in/yaml.v3.Node$"

    funlen:
      lines: 100
      statements: 50
      ignore-comments: true

    gochecksumtype:
      default-signifies-exhaustive: false

    gocognit:
      min-complexity: 20

    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false
      disabled-checks:
        - deprecatedComment

    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: false

    staticcheck:
      checks: ["all", "-QF1001", "-QF1002", "-QF1003", "-QF1004", "-QF1005", "-QF1006", "-QF1007", "-QF1008", "-QF1009", "-QF1010", "-QF1011", "-QF1012"]

    inamedparam:
      skip-single-param: true

    mnd:
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets.*
        - prometheus.LinearBuckets

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation: [ funlen, gocognit, lll ]
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

    sloglint:
      no-global: "all"
      context: "scope"

    usetesting:
      os-temp-dir: true

  exclusions:
    rules:
      - source: "(noinspection|TODO)"
        linters: [ godot ]
      - source: "//noinspection"
        linters: [ gocritic ]
      - path: "_test\\.go"
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - goconst
          - gosec
          - noctx
          - wrapcheck
      - path: "internal/upgrade/"
        linters: [ errcheck ]
      - path: "pkg/env/configuration\\.go"
        linters: [ errcheck ]
      - path: "setup/migrations\\.go"
        linters: [ errcheck ]
      - path: "utils/librarypath/librarypath\\.go"
        linters: [ errcheck, noctx ]
      - path: "utils/dcc32/dcc32\\.go"
        linters: [ noctx ]
      - path: "internal/adapters/secondary/git/git_native\\.go"
        linters: [ noctx ]
      - path: "internal/core/services/compiler/executor\\.go"
        linters: [ noctx, gosec ]
      - path: "internal/core/services/scripts/runner\\.go"
        linters: [ gosec ]
      - path: "utils/hash\\.go"
        linters: [ gosec ]
      - path: "internal/adapters/primary/cli/config/"
        linters: [ goconst ]
      - path: "internal/adapters/primary/cli/root\\.go"
        linters: [ goconst ]
      - path: "internal/core/ports/git\\.go"
        linters: [ gocritic ]
      - path: "internal/core/services/installer/"
        linters: [ gocritic ]
      - path: "internal/adapters/secondary/git/git\\.go"
        linters: [ revive ]
      - path: "internal/adapters/secondary/git/git_embedded\\.go"
        linters: [ revive ]
      - path: "internal/adapters/secondary/git/git_native\\.go"
        linters: [ revive ]
      - path: "internal/core/services/compiler/progress\\.go"
        linters: [ revive ]
      - path: "internal/core/services/installer/progress\\.go"
        linters: [ revive ]
      - path: "internal/infra/error_filesystem\\.go"
        linters: [ revive ]
      - path: "pkg/consts/consts\\.go"
        linters: [ revive ]
      - path: "pkg/msg/msg\\.go"
        linters: [ revive ]
      - path: "internal/core/domain/graph\\.go"
        linters: [ perfsprint ]
      - path: "internal/core/services/compiler/compiler\\.go"
        linters: [ perfsprint ]
      - path: "internal/core/services/compiler/executor\\.go"
        linters: [ perfsprint ]
      - path: "setup/paths\\.go"
        linters: [ perfsprint ]
      - path: "utils/dcp/dcp\\.go"
        linters: [ perfsprint ]

formatters:
  enable:
    - goimports

issues:
  max-same-issues: 50
